name: jfrog-oidc-repro

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  JF_URL: https://elinaf.jfrog.io

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: jfrog/setup-jfrog-cli@v5.0.0
        id: jfrog-auth
        with:
          oidc-provider-name: ronma
          oidc-audience: jf

      - env:
          JFROG_TOKEN: ${{ steps.jfrog-auth.outputs.oidc-token }}
        run: |
          echo "Token length: ${#JFROG_TOKEN}"
          curl -sS -vvv -X PUT \
            -H "Authorization: Bearer ${JFROG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "rclass": "local",
              "packageType": "generic"
            }' \
            "${JF_URL}/artifactory/api/repositories/test-admin-github-actions-repo"

