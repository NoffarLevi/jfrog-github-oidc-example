name: jfrog-oidc-repro

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  JF_URL: https://elinaf.jfrog.io

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: jfrog/setup-jfrog-cli@v5.0.0
        id: jfrog-auth
        with:
          oidc-provider-name: ronma
          oidc-audience: jf

      - env:
          JFROG_TOKEN: ${{ steps.jfrog-auth.outputs.oidc-token }}
        run: |
          echo "Token length: ${#JFROG_TOKEN}"
          curl -sS -f -X POST "${JF_URL}/access/api/v1/tokens" \
            -H "Authorization: Bearer ${JFROG_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "grant_type": "client_credentials",
              "username": "scim_admin",
              "scope": "system:identities:r,w,d",
              "expires_in": 0,
              "description": "scim-token-probe",
              "audience": "*@*"
            }'
